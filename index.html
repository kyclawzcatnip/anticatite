<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Cat World</title>
  <meta name="description"
    content="A retro 2D platformer starring a brave cat on an adventure through worlds, castles, and sky islands!">
  <link rel="stylesheet" href="style.css?v=20260316c">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="448"></canvas>
    <div id="hud">
      <span id="lives-display">🐱 × 3</span>
      <span id="coin-display">🪙 × 0</span>
      <span id="score-display">SCORE: 0</span>
      <span id="level-display">WORLD 1</span>
    </div>
    <div id="overlay" class="visible">
      <div id="overlay-title">SUPER CAT WORLD</div>
      <div id="overlay-sub">PRESS SPACE TO START<br>PRESS 2 FOR CO-OP</div>
    </div>

    <!-- ONLINE MULTIPLAYER LOBBY -->
    <div id="lobby-overlay" class="hidden">
      <div id="lobby-layout">

        <!-- LEFT: Host/Join controls -->
        <div id="lobby-panel">
          <div id="lobby-title">🌐 ONLINE CO-OP</div>
          <div id="lobby-status"></div>

          <div id="lobby-menu">
            <!-- Room mode toggle -->
            <div id="room-mode-toggle">
              <button id="btn-mode-private" class="mode-btn mode-btn-active" onclick="window._setRoomMode(false)">
                🔒 PRIVATE
              </button>
              <button id="btn-mode-public" class="mode-btn" onclick="window._setRoomMode(true)">
                🌍 PUBLIC
              </button>
            </div>
            <!-- Player count toggle -->
            <div id="room-mode-toggle" style="margin-top:4px">
              <button id="btn-mode-2p" class="mode-btn mode-btn-active" onclick="window._set4Player(false)">
                👥 2P
              </button>
              <button id="btn-mode-4p" class="mode-btn" onclick="window._set4Player(true)">
                👥 4P
              </button>
            </div>
            <div id="room-mode-desc">Code required, auto-join</div>

            <button id="btn-host" class="lobby-btn" onclick="window._lobbyHost()">
              <span class="lobby-btn-icon">📡</span>
              HOST GAME
            </button>
            <div id="lobby-divider">— OR —</div>
            <div id="join-section">
              <input id="join-code-input" type="text" maxlength="4" placeholder="ROOM CODE"
                spellcheck="false" autocomplete="off">
              <button id="btn-join" class="lobby-btn lobby-btn-join" onclick="window._lobbyJoin()">
                <span class="lobby-btn-icon">🔗</span>
                JOIN GAME
              </button>
            </div>
          </div>

          <div id="lobby-waiting" class="hidden">
            <div id="lobby-room-code-display">
              <div id="lobby-room-label">ROOM CODE</div>
              <div id="lobby-room-code">----</div>
              <div id="lobby-room-hint">Share this code with your friend</div>
            </div>
            <div id="lobby-room-mode-badge"></div>
            <div id="lobby-connection-status">
              <span id="lobby-dot" class="pulse-dot"></span>
              <span id="lobby-connection-text">Waiting for player...</span>
            </div>
            <button id="btn-host-start" class="lobby-btn hidden" onclick="window._hostStartEarly()" style="margin-top:8px;border-color:#00FF88;color:#00FF88;">
              ▶ START GAME
            </button>
          </div>

          <!-- Join request approval (public rooms) -->
          <div id="lobby-approval" class="hidden">
            <div id="approval-title">⚡ JOIN REQUEST</div>
            <div id="approval-text">A player wants to join!</div>
            <div id="approval-buttons">
              <button class="lobby-btn lobby-btn-approve" onclick="window._approveJoin()">
                ✅ ACCEPT
              </button>
              <button class="lobby-btn lobby-btn-deny" onclick="window._denyJoin()">
                ❌ DENY
              </button>
            </div>
          </div>

          <button id="btn-lobby-back" class="lobby-btn lobby-btn-back" onclick="window._lobbyBack()">
            ◀ BACK
          </button>
        </div>

        <!-- RIGHT: Public room browser -->
        <div id="room-browser">
          <div id="browser-header">
            <span>🌍 PUBLIC ROOMS</span>
            <button id="btn-refresh" class="lobby-btn lobby-btn-refresh" onclick="window._refreshRooms()">
              🔄
            </button>
          </div>
          <div id="room-list">
            <div id="room-list-empty">No public rooms found.<br>Click 🔄 to refresh.</div>
          </div>
        </div>

      </div>
    </div>

    <div id="mobile-controls">
      <button id="btn-left" aria-label="Move Left">◀</button>
      <button id="btn-right" aria-label="Move Right">▶</button>
      <button id="btn-jump" aria-label="Jump">▲</button>
    </div>
  </div>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="network.js?v=20260316c"></script>
  <script src="game.js?v=20260316c"></script>
</body>

</html>
